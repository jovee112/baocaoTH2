name: mini_todo_app
description: A simple Flutter mini todo app (add/edit/delete, due dates, localization-ready).
publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=2.17.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  flutter_local_notifications: ^12.0.4
  shared_preferences: ^2.2.2
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
